name: CI/CD Frontend — Despachos

on:
  push:
    branches:
      - deploy

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/frontend-despacho

jobs:
  build-and-push:
    name: Build Docker image & push to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codigo fuente
        uses: actions/checkout@v4

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build y Push de la imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: VITE_API_URL=http://${{ secrets.EC2_BACKEND_PRIVATE_IP }}:8081
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    name: Deploy en EC2 Frontend
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copiar docker-compose al servidor
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_FRONTEND_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/home/ec2-user/frontend"

      - name: Deploy en EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_FRONTEND_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/frontend
            cat > .env <<EOF
            BACKEND_HOST=${{ secrets.EC2_BACKEND_PRIVATE_IP }}
            DOCKER_IMAGE=${{ env.IMAGE_NAME }}:${{ github.sha }}
            EOF
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            docker compose down
            docker compose pull
            docker compose up -d
            docker image prune -f
